<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>英語語順・英単語ヒント付きプリント</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        .control-panel {
            width: 210mm;
            margin: 20px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 150px;
            margin-top: 10px;
            font-size: 16px;
            padding: 10px;
            box-sizing: border-box;
        }

        .button-group {
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }

        button.print-btn {
            background: #27ae60;
        }

        .page {
            width: 210mm;
            height: 297mm;
            padding: 10mm;
            margin: 10mm auto;
            background-color: white;
            box-sizing: border-box;
            border: 5px solid #4a90e2;
            position: relative;
        }

        .inner-border {
            width: 100%;
            height: 100%;
            border: 2px solid #4a90e2;
            padding: 10mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            font-size: 24pt;
            margin: 0 0 20px 0;
            color: #2c3e50;
        }

        .name-section {
            text-align: right;
            font-size: 14pt;
            margin-bottom: 20px;
        }

        .name-input {
            display: inline-block;
            width: 300px;
        }

        .problem-list {
            flex-grow: 1;
        }

        .problem-item {
            margin-bottom: 50px;
            border-bottom: 1px dotted #ccc;
            padding-bottom: 30px;
        }

        .number-box {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
            border: 3px solid #4a90e2;
            color: #4a90e2;
            border-radius: 8px;
            margin-right: 10px;
            font-weight: bold;
            font-size: 14pt;
            vertical-align: middle;
        }

        .word-group {
            display: inline-block;
            vertical-align: top;
            margin-right: 15px;
            text-align: center;
        }

        .hint-text {
            font-size: 16pt;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .word-card {
            border: 2px solid #555;
            padding: 8px 16px;
            border-radius: 8px;
            background-color: #f2f2f2;
            font-size: 16pt;
            font-weight: bold;
            display: block;
        }

        .answer-area {
            margin-left: 45px;
            margin-top: 20px;
        }

        .answer-row {
            display: inline-block;
            margin-right: 20px;
            text-align: center;
        }

        .answer-box {
            width: 140px;
            height: 60px;
            border: 2px solid #333;
            border-radius: 4px;
            margin-top: 5px;
        }

        .review-section {
            margin-top: 10px;
            padding: 15px;
            border: 2px solid #4a90e2;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .review-title {
            font-weight: bold;
            font-size: 14pt;
            margin-bottom: 10px;
            color: #4a90e2;
        }

        .review-item {
            font-size: 14pt;
            margin-bottom: 5px;
        }

        @media print {
            .control-panel { display: none; }
            body { background-color: white; }
            .page { 
                margin: 0; 
                box-shadow: none; 
                -webkit-print-color-adjust: exact;
            }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <div class="button-group">
        <button onclick="copyPrompt()">AIプロンプトをコピー</button>
        <button onclick="resetToDefault()">デフォルトに戻す</button>
        <button class="print-btn" onclick="window.print()">印刷する</button>
    </div>
    <p>入力形式：日本語文|英単語1,英単語2,英単語3（改行で区切る）</p>
    <textarea id="problemInput" oninput="generateWorksheet()"></textarea>
</div>

<div class="page" id="printArea">
    <div class="inner-border">
        <h1>英語をならべかえよう（ヒントあり）</h1>
        <div class="name-section">なまえ（<span class="name-input"></span>）</div>
        <div class="problem-list" id="problemList">
        </div>
        
        <div class="review-section">
            <div class="review-title">みなおしチェック</div>
            <div class="review-item"><input type="checkbox"> ピリオドはつけましたか？</div>
            <div class="review-item"><input type="checkbox"> 最初の文字は大文字にしましたか？</div>
        </div>
    </div>
</div>

<script>
    const defaultProblems = 
"わたしは,ばななを,食べる|I,a banana,eat\nあなたは,りんごが,好き|You,an apple,like\nぼくは,本を,よむ|I,a book,read";

    function copyPrompt() {
        const prompt = "以下の条件で、英語並べ替え問題のデータを作成してください。・小学校高学年向け・形式は「日本語文|英単語1,英単語2,英単語3」の形式で出力・日本語はカンマ区切りで単語に分解しておく・英単語は、日本語の並びに合わせて、対応する英単語をカンマ区切りで並べる・冠詞(a, an, the)が名詞につく場合は、冠詞と名詞の間はカンマで区切らずにスペースを入れて1つの単語として扱ってください（例: a banana）・SVOの文で3個作成する";
        navigator.clipboard.writeText(prompt);
        alert("プロンプトをコピーしました！AIに貼り付けてください。");
    }

    function resetToDefault() {
        document.getElementById('problemInput').value = defaultProblems;
        generateWorksheet();
    }

    function generateWorksheet() {
        const input = document.getElementById('problemInput').value;
        const list = document.getElementById('problemList');
        list.innerHTML = '';
        
        const lines = input.split('\n');
        lines.forEach((line, index) => {
            if (line.trim() === '') return;
            const parts = line.split('|');
            const jpWords = parts[0].split(',');
            const engWords = parts[1] ? parts[1].split(',') : [];
            
            const div = document.createElement('div');
            div.className = 'problem-item';
            
            let wordGroups = '';
            for(let i = 0; i < jpWords.length; i++) {
                wordGroups += '<div class="word-group">' +
                                '<div class="hint-text">' + (engWords[i] || '') + '</div>' +
                                '<div class="word-card">' + (jpWords[i] || '') + '</div>' +
                              '</div>';
            }
            
            let answerRows = '';
            for(let i = 0; i < engWords.length; i++) {
                answerRows += '<div class="answer-row"><div class="answer-box"></div></div>';
            }
            
            div.innerHTML = 
                '<div class="number-box">' + (index + 1) + '</div>' +
                '<div style="display:inline-block;">' + wordGroups + '</div>' +
                '<div class="answer-area">' + answerRows + '</div>';
            list.appendChild(div);
        });
    }

    resetToDefault();
</script>
</body>
</html>
